version: "3.9"

services:
  backend:
    build: ./backend
    container_name: route-optimizer-backend
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: route-optimizer-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # OPTIONAL: self-hosted OSRM backend for a specific region, instead of
  # relying on the public router.project-osrm.org demo server (which is
  # rate-limited and not intended for production traffic).
  #
  # To use it:
  #   1. Download a .osm.pbf extract for your region from
  #      https://download.geofabrik.de/
  #   2. Preprocess it once (from the route-optimizer/ directory):
  #        docker run -t -v "${PWD}/osrm-data:/data" osrm/osrm-backend \
  #          osrm-extract -p /opt/car.lua /data/your-region.osm.pbf
  #        docker run -t -v "${PWD}/osrm-data:/data" osrm/osrm-backend \
  #          osrm-partition /data/your-region.osrm
  #        docker run -t -v "${PWD}/osrm-data:/data" osrm/osrm-backend \
  #          osrm-customize /data/your-region.osrm
  #   3. Uncomment the service below and set OSRM_BASE_URL=http://osrm:5000
  #      in your .env, then pass osrm_base_url in /optimize requests.
  # ---------------------------------------------------------------------
  # osrm:
  #   image: osrm/osrm-backend
  #   container_name: route-optimizer-osrm
  #   command: osrm-routed --algorithm mld /data/your-region.osrm
  #   volumes:
  #     - ./osrm-data:/data
  #   ports:
  #     - "5000:5000"
